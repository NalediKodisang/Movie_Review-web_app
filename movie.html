<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topnav">
    <a class="active" href="index.html">MOVIE SITE</a>
    <div id="navUser"></div>
</div> 

<!-- Review form - only shown if logged in -->
<div class="review-form" id="reviewFormSection">
  <h2>Write a Review</h2>
  
  <!-- Shows "Reviewing as: username" when logged in -->
  <p id="loggedInAs" style="color: #4da3ff;"></p>

  <textarea id="reviewText" placeholder="Write review"></textarea>
  <br><br>

  <input id="rating" type="number" min="1" max="5" placeholder="Rating (1-5)" />
  <br><br>

  <button onclick="submitReview()">Submit Review</button>
</div>

<!-- Shown instead if NOT logged in -->
<div id="loginPrompt" style="display:none">
  <p>You need to be logged in to write a review.</p>
  <a href="login.html">Login here</a>
</div>

<hr>

<h1>Reviews for:</h1>
<h3 id="title">Movie Title</h3>

<section id="section"></section>

<script src="movie.js"></script>
</body>
</html>
